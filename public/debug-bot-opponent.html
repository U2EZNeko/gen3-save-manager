<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Debug: Bot Opponent API</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 20px auto; padding: 0 16px; }
    h1 { font-size: 1.25rem; }
    label { display: block; margin-top: 12px; }
    input[type="url"] { width: 100%; max-width: 400px; padding: 8px; box-sizing: border-box; }
    button { margin-top: 8px; padding: 8px 16px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 12px; overflow: auto; font-size: 12px; border-radius: 6px; }
    .error { color: #c00; }
    .meta { color: #666; font-size: 0.9rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Debug: Bot opponent/current_encounter response</h1>
  <p>Use this to see exactly what the bot API sends for the current encounter (e.g. to fix Unown form fields).</p>
  <label>Bot base URL (e.g. http://127.0.0.1:8903):</label>
  <input type="url" id="botUrl" value="http://127.0.0.1:8903" placeholder="http://127.0.0.1:8903">
  <button id="fetchBtn">Fetch opponent</button>
  <div id="out"></div>
  <script>
    document.getElementById('fetchBtn').onclick = async () => {
      const out = document.getElementById('out');
      const url = document.getElementById('botUrl').value.trim();
      if (!url) { out.innerHTML = '<p class="error">Enter a bot URL.</p>'; return; }
      out.innerHTML = '<p>Fetching…</p>';
      try {
        const res = await fetch('/api/debug-bot-opponent?url=' + encodeURIComponent(url));
        const raw = await res.json();
        if (!res.ok) {
          out.innerHTML = '<p class="error">' + (raw.error || res.statusText) + '</p>'; return;
        }
        out.innerHTML =
          '<p class="meta">Source: <code>' + (raw.source || '') + '</code></p>' +
          '<pre>' + JSON.stringify(raw.data, null, 2) + '</pre>';
      } catch (e) {
        out.innerHTML = '<p class="error">' + e.message + '</p>';
      }
    };
  </script>
</body>
</html>
